name: Social Comments Digest

on:
  schedule:
    - cron: "0 2,14 * * *"  # 北京时间约 10:00 / 22:00（UTC 02:00 / 14:00，视夏令时微调）
  workflow_dispatch:

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install extension deps
        run: pip install -r extensions/requirements.txt

      - name: Run social RSS digest
        env:
          DINGTALK_WEBHOOK_URL: ${{ secrets.DINGTALK_WEBHOOK_URL }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
          AI_API_BASE: ${{ secrets.AI_API_BASE }}
        working-directory: extensions
        run: python -m social_digest.run
